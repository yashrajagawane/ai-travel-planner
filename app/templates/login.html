<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Link to external CSS file in the static folder -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="card">
    <!-- Tab Navigation -->
    <div class="tab-container">
      <button id="login-tab" class="tab-button tab-active">Login / Sign in</button>
      <button id="signup-tab" class="tab-button">Sign up</button>
    </div>

    <!-- Form Content -->
    <div id="form-content">
      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-phone">Phone Number</label>
          <div class="mobile-input-wrapper">
            <div class="country-code">
              <!-- Indian Flag SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="#f93" d="M0 4h24v6H0z"/><path fill="#fff" d="M0 10h24v4H0z"/><path fill="#128807" d="M0 14h24v6H0z"/><path fill="#008" d="M12 12a2 2 0 1 1 0-4a2 2 0 0 1 0 4zm0 1a1 1 0 1 0 0-2a1 1 0 0 0 0 2z"/><path fill="none" stroke="#008" stroke-width=".2" d="m12 10 1.95 5.85-5.1-3.6h6.3l-5.1 3.6z"/></svg>
              <span>+91</span>
            </div>
            <input type="tel" id="login-phone" name="login_phone" placeholder="Enter Mobile Number" required>
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="login_password" placeholder="Enter Password" required>
        </div>
        <button id="login-btn" type="submit" class="btn btn-login">LOG IN</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label for="signup-name">Name</label>
            <input type="text" id="signup-name" name="signup_name" placeholder="Name" required>
          </div>
          <div class="form-group">
            <label for="signup-surname">Surname</label>
            <input type="text" id="signup-surname" name="signup_surname" placeholder="Surname" required>
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="signup_email" placeholder="Enter Email" required>
        </div>
        <div class="form-group">
          <label for="signup-phone">Phone Number</label>
          <input type="tel" id="signup-phone" name="signup_phone" placeholder="Enter Mobile Number" required>
        </div>
        <div class="form-group">
          <label for="signup-gender">Gender</label>
          <select id="signup-gender" name="signup_gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="signup_password" placeholder="Create a Password" required>
        </div>
        <div class="form-group" style="margin-bottom: 0.5rem;">
          <label for="signup-confirm-password">Confirm Password</label>
          <input type="password" id="signup-confirm-password" placeholder="Confirm your Password" required>
          <p id="password-error" class="error-message hidden">Passwords do not match!</p>
        </div>
        <button id="signup-btn" type="submit" class="btn btn-signup">SIGN UP</button>
      </form>
    </div>

    <!-- Separator -->
    <div class="separator">
      <hr><span>Or Login/Signup With</span><hr>
    </div>

    <!-- Social Logins -->
    <div class="social-logins">
      <a href="#" class="social-btn">G</a>
      <a href="#" class="social-btn">✉</a>
    </div>

    <!-- Footer -->
    <p class="footer-text">
      By proceeding, you agree to TripPlanner's
      <a href="#">Privacy Policy</a>,
      <a href="#">User Agreement</a> and
      <a href="#">T&Cs</a>
    </p>
  </div>

  <!-- Link to external JS file in the static folder -->
  <script src="{{ url_for('static', filename='JS/login.js') }}"></script>
</body>
</html>
